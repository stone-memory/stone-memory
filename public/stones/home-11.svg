<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="home-bg-11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a5a62;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a7a82;stop-opacity:1" />
