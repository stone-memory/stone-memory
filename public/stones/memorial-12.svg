<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mem-bg-12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5a6a;stop-opacity:1" />
