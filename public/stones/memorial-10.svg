<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mem-bg-10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a6a7a;stop-opacity:1" />
    </linearGradient>
    <filter id="grain-10">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0.3" />
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#mem-bg-10)"/>
  <rect width="800" height="1000" fill="url(#mem-bg-10)" opacity="0.08" filter="url(#grain-10)"/>
