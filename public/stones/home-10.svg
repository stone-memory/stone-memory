<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="home-bg-10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8dcc8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c8b0;stop-opacity:1" />
    </linearGradient>
    <filter id="grain-h10">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0.3" />
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#home-bg-10)"/>
  <rect width="800" height="1000" fill="url(#home-bg-10)" opacity="0.08" filter="url(#grain-h10)"/>
  <polygon points="400,200 600,400 550,700 250,700 200,400" fill="#a89888" opacity="0.62"/>
  <line x1="300" y1="500" x2="500" y2="500" stroke="#e8dcc8" stroke-width="1" opacity="0.3"/>
  <text x="400" y="920" text-anchor="middle" font-size="12" fill="#a89888" opacity="0.3" font-family="serif">SM</text>
</svg>
