name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit
